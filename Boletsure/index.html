<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eventix - Iniciar Sesión</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; height: 100vh; background: #0f0f0f;">
    
    <div class="card" style="width: 350px; background: #1a1a1a; padding: 30px; border-radius: 20px; border: 1px solid #333;">
        <h1 class="logo">🎟 EVENTIX</h1>
        <p style="color: #888;">Ingresa tus datos para continuar</p>
        
        <form id="loginForm">
            <input type="email" id="email" placeholder="Correo electrónico" required 
                   style="width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box;">
            
            <input type="password" id="password" placeholder="Contraseña" required 
                   style="width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box;">
            
            <button type="submit" id="btnIngresar" style="width: 100%; margin-top: 20px; padding: 12px; border-radius: 25px; background: #00d4ff; color: black; font-weight: bold; border: none; cursor: pointer;">
                INGRESAR
            </button>
        </form>
        <div id="mensajeError" style="color: #ff4d4d; margin-top: 15px; font-size: 0.8rem;"></div>
    </div>

    <script type="module">
        import { auth } from "./firebase-config.js";
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const loginForm = document.getElementById("loginForm");
        const mensajeError = document.getElementById("mensajeError");

        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const pass = document.getElementById("password").value;
            const btn = document.getElementById("btnIngresar");

            btn.innerText = "CARGANDO...";
            btn.disabled = true;

            try {
                // Intento de Login
                await signInWithEmailAndPassword(auth, email, pass);
                console.log("Login exitoso");
                window.location.assign("home.html"); // Forzar redirección
            } catch (error) {
                console.log("Error inicial:", error.code);
                
                // Si el usuario no existe, lo registramos automáticamente
                if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential' || error.code === 'auth/firebase-error') {
                    try {
                        await createUserWithEmailAndPassword(auth, email, pass);
                        window.location.assign("home.html");
                    } catch (regError) {
                        mensajeError.innerText = "Error: " + regError.message;
                        btn.innerText = "INGRESAR";
                        btn.disabled = false;
                    }
                } else {
                    mensajeError.innerText = "Error: " + error.message;
                    btn.innerText = "INGRESAR";
                    btn.disabled = false;
                }
            }
        });
    </script>
</body>
</html>
