
name: CI - Validación Proyecto Boletos

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Verificar que exista index.html
        run: |
          if [ ! -f index.html ]; then
            echo "Error: index.html no existe"
            exit 1
          fi

      - name: Verificar sintaxis de archivos JS
        run: |
          for file in *.js; do
            echo "Revisando $file"
            node --check $file
          done

      - name: Confirmación final
        run: echo "Pipeline ejecutado correctamente"
