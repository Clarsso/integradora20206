<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Selección de Asientos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <span class="logo">🎟 EVENTIX</span>
        <h2 id="tituloEvento">Cargando...</h2>
    </header>

    <div class="seats-container" id="seatsContainer"></div>

    <div class="summary">
        <p>Has seleccionado <span id="count" style="color:var(--primary); font-weight:bold;">0</span> asientos</p>
        <p style="font-size: 1.5rem;">Total: <span id="total" style="color:var(--primary); font-weight:bold;">$0</span></p>
        <button id="buyBtn">Confirmar y Pagar</button>
    </div>

    <script type="module" src="asientos.js"></script>
</body>
</html>
